name: Deploy landing page

# Publishes docs/site/ to GitHub Pages whenever it changes on the main branch.
# Enable Pages in repo settings → Pages → Source: GitHub Actions before the
# first deploy.

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site
      - id: deployment
        uses: actions/deploy-pages@v4
